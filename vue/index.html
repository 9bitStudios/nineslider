<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name = "viewport" content = "user-scalable=no, width=device-width">
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Nineslider - A simple responsive rotator/slider</title>
<link href="../css/style.css" rel="stylesheet" type="text/css" />
<script type="text/javascript" src="https://unpkg.com/vue"></script>

</head>

<body>

<div id="demo1"></div>

<script type="text/javascript" src="vue.nineslider.js"></script>
<script type="text/javascript">

/*** Vue ***/

var data = [
    {
        image: "../images/1.jpg",
        link: "https://github.com/9bitStudios/nineslider",
        caption: 'This is a caption'
    },
    {
        image: "../images/2.jpg",
        link: "",
        caption: 'This is another caption with <a href="https://github.com/9bitStudios/nineslider" target="_blank">a link</a>'
    },
    {
        image: "../images/3.jpg",
        link: "",
        caption: null
    },
    {
        image: "../images/4.jpg",
        link: "",
        caption: null
    }                            
];

nineslider("#demo1", {
    autoPlay: {
        enable: true,
        interval: 5000,
        pauseOnHover: true        
    },
    loaded: function(){
        console.log("Vue.js slider loaded...")
    }
}, data);

</script>
</body>
</html>
